services:
  db:
    image: postgres:15-alpine
    container_name: trivia_db
    environment:
      POSTGRES_DB: trivia_db
      POSTGRES_USER: trivia_user
      POSTGRES_PASSWORD: trivia_pass
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - trivia_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivia_user -d trivia_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trivia_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: trivia_db
      DB_USER: trivia_user
      DB_PASSWORD: trivia_pass
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: trivia_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  trivia_pg_data:
